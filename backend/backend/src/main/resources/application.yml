server:
  port: 8080

spring:
  application:
    name: ai-learning-platform

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_learning?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: REMOVED_DB_PASSWORD

  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ai.learning.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: REMOVED_JWT_SECRET
  expiration: 7200000

deepseek:
  api-key: REMOVED_API_KEY
  api-url: https://api.deepseek.com/v1
  model: deepseek-chat

logging:
  level:
    com.ai.learning: debug
